name: DevSecOps Security Pipeline

on:
  push:
    branches:
      - "**"

  pull_request:
    branches:
      - "**"

  schedule:
    # Daily at 2 AM UTC
    - cron: "0 2 * * *"

  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      PYTHON_VERSION: "3.12"
      NODE_VERSION: "22"

    steps:
      # --------------------------------------------------
      # Checkout Repository
      # --------------------------------------------------
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --------------------------------------------------
      # Initialize CodeQL
      # --------------------------------------------------
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python,javascript

      # --------------------------------------------------
      # Autobuild Project
      # --------------------------------------------------
      - name: Autobuild Project
        uses: github/codeql-action/autobuild@v4

      # --------------------------------------------------
      # Setup Python
      # --------------------------------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # --------------------------------------------------
      # Setup Node.js
      # --------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # --------------------------------------------------
      # Install Security Tools
      # --------------------------------------------------
      - name: Install Security Tools
        run: |
          python -m pip install --upgrade pip
          pip install semgrep pip-audit

      # --------------------------------------------------
      # Install Gitleaks
      # --------------------------------------------------
      - name: Install Gitleaks
        run: |
          wget https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz
          tar -xzf gitleaks_8.24.3_linux_x64.tar.gz
          sudo mv gitleaks /usr/local/bin/

      # --------------------------------------------------
      # Run Gitleaks Full Repository Scan
      # --------------------------------------------------
      - name: Run Gitleaks Scan
        id: gitleaks
        continue-on-error: true
        run: |
          gitleaks detect \
            --source . \
            --verbose \
            --redact \
            --report-format sarif \
            --report-path gitleaks.sarif \
            --exit-code 1 || true

      # --------------------------------------------------
      # Upload Gitleaks SARIF
      # --------------------------------------------------
      - name: Upload Gitleaks SARIF
        if: always() && hashFiles('gitleaks.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gitleaks.sarif

      # --------------------------------------------------
      # Run Semgrep
      # --------------------------------------------------
      - name: Run Semgrep Scan
        id: semgrep
        continue-on-error: true
        run: |
          semgrep \
            --config=auto \
            --exclude=node_modules \
            --exclude=dist \
            --exclude=build \
            --exclude=coverage \
            --exclude=.next \
            --exclude=vendor \
            --exclude=package-lock.json \
            --exclude=yarn.lock \
            --sarif \
            --output semgrep.sarif \
            --error \
            . || true

      # --------------------------------------------------
      # Upload Semgrep SARIF
      # --------------------------------------------------
      - name: Upload Semgrep SARIF
        if: always() && hashFiles('semgrep.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif

      # --------------------------------------------------
      # Run pip-audit
      # --------------------------------------------------
      - name: Run pip-audit
        id: pip_audit
        continue-on-error: true
        run: |
          if [ -f requirements.txt ]; then
            pip-audit -r requirements.txt || true

          elif [ -f backend/requirements.txt ]; then
            pip-audit -r backend/requirements.txt || true

          else
            echo "No Python dependency file found"
          fi

      # --------------------------------------------------
      # Run npm audit
      # --------------------------------------------------
      - name: Run npm audit
        id: npm_audit
        continue-on-error: true
        run: |
          if [ -f frontend/package.json ]; then
            cd frontend
            npm ci
            npm audit --audit-level=high || true

          elif [ -f package.json ]; then
            npm ci
            npm audit --audit-level=high || true

          else
            echo "No Node.js project found"
          fi

      # --------------------------------------------------
      # Run CodeQL Analysis
      # --------------------------------------------------
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

      # --------------------------------------------------
      # Determine Final Security Status
      # --------------------------------------------------
      - name: Determine Final Status
        id: final_status
        run: |
          FAILED=false

          # Check Semgrep findings
          if [ -f semgrep.sarif ]; then
            if grep -q '"results"' semgrep.sarif; then
              if ! grep -q '"results":[]' semgrep.sarif; then
                FAILED=true
              fi
            fi
          fi

          # Check Gitleaks findings
          if [ -f gitleaks.sarif ]; then
            if grep -q '"ruleId"' gitleaks.sarif; then
              FAILED=true
            fi
          fi

          echo "FAILED=$FAILED" >> $GITHUB_ENV

          echo "Security Findings Present: $FAILED"

      # --------------------------------------------------
      # Security Warning Summary
      # --------------------------------------------------
      - name: Security Warning Summary
        if: env.FAILED == 'true'
        run: |
          echo "⚠️ Security vulnerabilities or secrets were detected."
          echo "⚠️ Workflow is running in MONITORING MODE."
          echo "⚠️ Pipeline will NOT fail."

      # --------------------------------------------------
      # Send Email Notification
      # --------------------------------------------------
      - name: Send Security Alert Email
        if: env.FAILED == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true

          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}

          subject: |
            ⚠️ Security Findings Detected - ${{ github.repository }}

          to: jabhi4441@gmail.com
          from: GitHub Security Bot

          body: |
            Security vulnerabilities or leaked secrets were detected.

            NOTE:
            This workflow is running in monitoring mode.
            The pipeline was NOT failed intentionally.

            Repository:
            ${{ github.repository }}

            Branch:
            ${{ github.ref_name }}

            Commit:
            ${{ github.sha }}

            Triggered By:
            ${{ github.actor }}

            Event:
            ${{ github.event_name }}

            Workflow Run:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
