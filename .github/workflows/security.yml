name: DevSecOps Security Pipeline

on:
  push:
    branches:
      - "**"

  pull_request:
    branches:
      - "**"

  schedule:
    # Daily at 2 AM UTC
    - cron: '0 2 * * *'

  workflow_dispatch:

jobs:

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      security-events: write
      contents: read
      actions: read

    env:
      PYTHON_VERSION: "3.11"
      NODE_VERSION: "20"

    steps:

      # --------------------------------------------------
      # Checkout Repository
      # --------------------------------------------------
      - name: Checkout Code
        uses: actions/checkout@v4

      # --------------------------------------------------
      # Gitleaks - Secret Detection
      # --------------------------------------------------
      - name: Run Gitleaks
        id: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --------------------------------------------------
      # Setup Python
      # --------------------------------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # --------------------------------------------------
      # Install Python Dependencies
      # --------------------------------------------------
      - name: Install Python Security Tools
        run: |
          python -m pip install --upgrade pip
          pip install semgrep pip-audit

      # --------------------------------------------------
      # Run Semgrep
      # --------------------------------------------------
      - name: Run Semgrep Scan
        id: semgrep
        run: |
          semgrep \
            --config=p/python \
            --config=p/react \
            --config=p/secrets \
            --config=p/owasp-top-ten \
            --exclude=node_modules \
            --exclude=build \
            --exclude=dist \
            --exclude=coverage \
            --exclude=tests \
            --exclude=package-lock.json \
            --exclude=yarn.lock \
            --sarif \
            --output semgrep.sarif \
            .

      # --------------------------------------------------
      # Upload SARIF to GitHub Security Dashboard
      # --------------------------------------------------
      - name: Upload SARIF Results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif

      # --------------------------------------------------
      # Run pip-audit (Python CVEs)
      # --------------------------------------------------
      - name: Run pip-audit
        id: pip_audit
        continue-on-error: true
        run: |
          if [ -f requirements.txt ]; then
            pip-audit -r requirements.txt
          elif [ -f backend/requirements.txt ]; then
            pip-audit -r backend/requirements.txt
          else
            echo "No requirements.txt found"
          fi

      # --------------------------------------------------
      # Setup Node.js
      # --------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # --------------------------------------------------
      # Run npm audit
      # --------------------------------------------------
      - name: Run npm audit
        id: npm_audit
        continue-on-error: true
        run: |
          if [ -f frontend/package.json ]; then
            cd frontend
            npm install
            npm audit --audit-level=high
          elif [ -f package.json ]; then
            npm install
            npm audit --audit-level=high
          else
            echo "No package.json found"
          fi

      # --------------------------------------------------
      # Determine Final Scan Status
      # --------------------------------------------------
      - name: Check Scan Status
        id: scan_status
        run: |
          FAILED=false

          if [ "${{ steps.gitleaks.outcome }}" != "success" ]; then
            FAILED=true
          fi

          if [ "${{ steps.semgrep.outcome }}" != "success" ]; then
            FAILED=true
          fi

          if [ "${{ steps.pip_audit.outcome }}" != "success" ]; then
            FAILED=true
          fi

          if [ "${{ steps.npm_audit.outcome }}" != "success" ]; then
            FAILED=true
          fi

          echo "FAILED=$FAILED" >> $GITHUB_ENV

      # --------------------------------------------------
      # Send Email Notification
      # --------------------------------------------------
      - name: Send Security Alert Email
        if: env.FAILED == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true

          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}

          subject: |
            🚨 Security Scan Failed - ${{ github.repository }}

          to: jabhi4441@gmail.com
          from: GitHub Security Bot

          body: |
            Security vulnerabilities or leaked secrets were detected.

            Repository:
            ${{ github.repository }}

            Branch:
            ${{ github.ref_name }}

            Commit:
            ${{ github.sha }}

            Triggered By:
            ${{ github.actor }}

            Event:
            ${{ github.event_name }}

            View Workflow:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      # --------------------------------------------------
      # Fail Pipeline
      # --------------------------------------------------
      - name: Fail Pipeline
        if: env.FAILED == 'true'
        run: |
          echo "Security scan failed."
          exit 1
