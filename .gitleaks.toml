title = "Enterprise DevSecOps Gitleaks Configuration"

# =========================================================
# EXTEND DEFAULT GITLEAKS RULESET
# =========================================================

[extend]
useDefault = true

# =========================================================
# GLOBAL ALLOWLIST
# =========================================================

[allowlist]
description = "Ignore generated dependencies and build artifacts"

paths = [
  '''node_modules''',
  '''dist''',
  '''build''',
  '''coverage''',
  '''vendor''',
  '''.next''',
  '''target''',
  '''out''',
  '''tmp''',
  '''temp''',
  '''package-lock.json''',
  '''yarn.lock''',
  '''pnpm-lock.yaml''',
  '''poetry.lock''',
  '''Cargo.lock''',
  '''.*\.min\.js''',
  '''.*\.map'''
]

# =========================================================
# OPENAI API KEYS
# =========================================================

[[rules]]
id = "openai-api-key"

description = "OpenAI API Key"

regex = '''sk-(proj-)?[A-Za-z0-9_\-]{20,}'''

tags = ["openai", "api", "secret", "key"]

# =========================================================
# ANTHROPIC CLAUDE API KEYS
# =========================================================

[[rules]]
id = "anthropic-api-key"

description = "Anthropic Claude API Key"

regex = '''sk-ant-[A-Za-z0-9\-_]{20,}'''

tags = ["anthropic", "claude", "secret"]

# =========================================================
# GOOGLE GEMINI API KEYS
# =========================================================

[[rules]]
id = "google-gemini-api-key"

description = "Google Gemini API Key"

regex = '''AIza[0-9A-Za-z\-_]{35}'''

tags = ["google", "gemini", "secret"]

# =========================================================
# GOOGLE SERVICE ACCOUNT JSON
# =========================================================

[[rules]]
id = "google-service-account"

description = "Google Service Account"

regex = '''"type":\s*"service_account"'''

tags = ["google", "service-account"]

# =========================================================
# AWS ACCESS KEY ID
# =========================================================

[[rules]]
id = "aws-access-key-id"

description = "AWS Access Key ID"

regex = '''AKIA[0-9A-Z]{16}'''

tags = ["aws", "secret"]

# =========================================================
# AWS SECRET ACCESS KEY
# =========================================================

[[rules]]
id = "aws-secret-access-key"

description = "AWS Secret Access Key"

regex = '''(?i)aws(.{0,20})?(secret|access)?(.{0,20})?['"][0-9a-zA-Z\/+]{40}['"]'''

tags = ["aws", "secret"]

# =========================================================
# AWS SESSION TOKEN
# =========================================================

[[rules]]
id = "aws-session-token"

description = "AWS Session Token"

regex = '''FQoGZXIvYXdzE[a-zA-Z0-9\/+=]{20,}'''

tags = ["aws", "token"]

# =========================================================
# AZURE STORAGE KEYS
# =========================================================

[[rules]]
id = "azure-storage-key"

description = "Azure Storage Key"

regex = '''DefaultEndpointsProtocol=https;AccountName=.*;AccountKey=[A-Za-z0-9+/=]{40,}'''

tags = ["azure", "secret"]

# =========================================================
# AZURE CLIENT SECRET
# =========================================================

[[rules]]
id = "azure-client-secret"

description = "Azure Client Secret"

regex = '''(?i)(azure|client)[_\- ]?(secret|password)[_\- ]?[:=][_\- ]?['"][A-Za-z0-9\-_=]{20,}['"]'''

tags = ["azure", "secret"]

# =========================================================
# GITHUB TOKENS
# =========================================================

[[rules]]
id = "github-token"

description = "GitHub Token"

regex = '''gh[pousr]_[A-Za-z0-9_]{30,255}'''

tags = ["github", "token"]

# =========================================================
# GITLAB TOKENS
# =========================================================

[[rules]]
id = "gitlab-token"

description = "GitLab Token"

regex = '''glpat-[A-Za-z0-9\-_]{20,}'''

tags = ["gitlab", "token"]

# =========================================================
# SLACK TOKENS
# =========================================================

[[rules]]
id = "slack-token"

description = "Slack Token"

regex = '''xox[baprs]-[A-Za-z0-9\-]{10,100}'''

tags = ["slack", "token"]

# =========================================================
# DISCORD WEBHOOKS
# =========================================================

[[rules]]
id = "discord-webhook"

description = "Discord Webhook URL"

regex = '''https:\/\/discord(?:app)?\.com\/api\/webhooks\/[0-9]+\/[A-Za-z0-9\-_]+'''

tags = ["discord", "webhook"]

# =========================================================
# STRIPE SECRET KEYS
# =========================================================

[[rules]]
id = "stripe-secret-key"

description = "Stripe Secret Key"

regex = '''sk_live_[0-9a-zA-Z]{24,}'''

tags = ["stripe", "secret"]

# =========================================================
# STRIPE PUBLISHABLE KEYS
# =========================================================

[[rules]]
id = "stripe-publishable-key"

description = "Stripe Publishable Key"

regex = '''pk_live_[0-9a-zA-Z]{24,}'''

tags = ["stripe", "public"]

# =========================================================
# TWILIO API KEYS
# =========================================================

[[rules]]
id = "twilio-api-key"

description = "Twilio API Key"

regex = '''SK[0-9a-fA-F]{32}'''

tags = ["twilio", "secret"]

# =========================================================
# SENDGRID API KEYS
# =========================================================

[[rules]]
id = "sendgrid-api-key"

description = "SendGrid API Key"

regex = '''SG\.[A-Za-z0-9_\-]{20,}\.[A-Za-z0-9_\-]{20,}'''

tags = ["sendgrid", "secret"]

# =========================================================
# JWT TOKENS
# =========================================================

[[rules]]
id = "jwt-token"

description = "JWT Token"

regex = '''eyJ[A-Za-z0-9_\-]+?\.[A-Za-z0-9_\-]+\.?[A-Za-z0-9_\-./+=]*'''

tags = ["jwt", "token"]

# =========================================================
# PRIVATE KEYS
# =========================================================

[[rules]]
id = "private-key"

description = "Private Key"

regex = '''-----BEGIN(.*?)PRIVATE KEY-----'''

tags = ["private-key", "certificate"]

# =========================================================
# OPENSSH PRIVATE KEYS
# =========================================================

[[rules]]
id = "openssh-private-key"

description = "OpenSSH Private Key"

regex = '''-----BEGIN OPENSSH PRIVATE KEY-----'''

tags = ["ssh", "private-key"]

# =========================================================
# DATABASE CONNECTION STRINGS
# =========================================================

[[rules]]
id = "database-url"

description = "Database Connection String"

regex = '''(?i)(postgres|mysql|mongodb|redis):\/\/[^:\s]+:[^@\s]+@[^:\s]+'''

tags = ["database", "credentials"]

# =========================================================
# GENERIC PASSWORDS
# =========================================================

[[rules]]
id = "generic-password"

description = "Generic Password Assignment"

regex = '''(?i)(password|passwd|pwd)\s*[:=]\s*['"][^'"]{6,}['"]'''

tags = ["password"]

# =========================================================
# GENERIC API KEYS
# =========================================================

[[rules]]
id = "generic-api-key"

description = "Generic API Key"

regex = '''(?i)(api[_-]?key|secret|token)\s*[:=]\s*['"][A-Za-z0-9_\-]{16,}['"]'''

tags = ["generic", "api-key"]

# =========================================================
# FIREBASE API KEYS
# =========================================================

[[rules]]
id = "firebase-api-key"

description = "Firebase API Key"

regex = '''AIza[0-9A-Za-z\-_]{35}'''

tags = ["firebase", "secret"]

# =========================================================
# DOCKER AUTH TOKENS
# =========================================================

[[rules]]
id = "docker-auth"

description = "Docker Auth Token"

regex = '''(?i)"auth"\s*:\s*"[A-Za-z0-9+/=]{20,}"'''

tags = ["docker", "secret"]

# =========================================================
# KUBERNETES TOKENS
# =========================================================

[[rules]]
id = "kubernetes-token"

description = "Kubernetes Bearer Token"

regex = '''(?i)bearer\s+[A-Za-z0-9\-_\.=]{20,}'''

tags = ["kubernetes", "token"]

# =========================================================
# NPM TOKENS
# =========================================================

[[rules]]
id = "npm-token"

description = "NPM Token"

regex = '''npm_[A-Za-z0-9]{36}'''

tags = ["npm", "token"]

# =========================================================
# PYPI TOKENS
# =========================================================

[[rules]]
id = "pypi-token"

description = "PyPI Token"

regex = '''pypi-[A-Za-z0-9_\-]{50,}'''

tags = ["pypi", "token"]

# =========================================================
# HEROKU API KEYS
# =========================================================

[[rules]]
id = "heroku-api-key"

description = "Heroku API Key"

regex = '''[hH]eroku.{0,20}[0-9a-fA-F]{32}'''

tags = ["heroku", "secret"]

# =========================================================
# DIGITALOCEAN TOKENS
# =========================================================

[[rules]]
id = "digitalocean-token"

description = "DigitalOcean Token"

regex = '''dop_v1_[A-Za-z0-9]{64}'''

tags = ["digitalocean", "token"]

# =========================================================
# CLOUDINARY URLS
# =========================================================

[[rules]]
id = "cloudinary-url"

description = "Cloudinary URL"

regex = '''cloudinary:\/\/[0-9]+:[A-Za-z0-9]+@[A-Za-z0-9]+'''

tags = ["cloudinary", "secret"]

# =========================================================
# MONGODB CONNECTION STRINGS
# =========================================================

[[rules]]
id = "mongodb-uri"

description = "MongoDB URI"

regex = '''mongodb(\+srv)?:\/\/[^:\s]+:[^@\s]+@[^"\s]+'''

tags = ["mongodb", "database"]

# =========================================================
# POSTGRES CONNECTION STRINGS
# =========================================================

[[rules]]
id = "postgres-uri"

description = "PostgreSQL URI"

regex = '''postgres(ql)?:\/\/[^:\s]+:[^@\s]+@[^"\s]+'''

tags = ["postgres", "database"]

# =========================================================
# REDIS CONNECTION STRINGS
# =========================================================

[[rules]]
id = "redis-uri"

description = "Redis URI"

regex = '''redis:\/\/[^:\s]+:[^@\s]+@[^"\s]+'''

tags = ["redis", "database"]

# =========================================================
# BASIC AUTH URLs
# =========================================================

[[rules]]
id = "basic-auth-url"

description = "Basic Auth Credentials in URL"

regex = '''https?:\/\/[^:\s]+:[^@\s]+@[^"\s]+'''

tags = ["basic-auth", "credentials"]